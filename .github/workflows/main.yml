name: RDP

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 360  # GitHub Actions hard limit is 360

    steps:
      - name: Configure Core RDP Settings
        shell: pwsh
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
                           -Name "fDenyTSConnections" -Value 0 -Force

          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                           -Name "UserAuthentication" -Value 0 -Force

          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                           -Name "SecurityLayer" -Value 0 -Force

          netsh advfirewall firewall delete rule name="RDP-Tailscale" 2>$null
          netsh advfirewall firewall add rule name="RDP-Tailscale" `
            dir=in action=allow protocol=TCP localport=3389

          Restart-Service -Name TermService -Force
          Write-Host "RDP configured successfully."

      - name: Create RDP User with Secure Password
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.Security

          $charSet = @{
              Upper   = [char[]](65..90)
              Lower   = [char[]](97..122)
              Number  = [char[]](48..57)
              Special = ([char[]](33..47) + [char[]](58..64) +
                         [char[]](91..96) + [char[]](123..126))
          }

          $rawPassword = @()
          $rawPassword += $charSet.Upper   | Get-Random -Count 4
          $rawPassword += $charSet.Lower   | Get-Random -Count 4
          $rawPassword += $charSet.Number  | Get-Random -Count 4
          $rawPassword += $charSet.Special | Get-Random -Count 4
          $password = -join ($rawPassword | Sort-Object { Get-Random })

          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires -ErrorAction Stop
          Add-LocalGroupMember -Group "Administrators"        -Member "RDP"
          Add-LocalGroupMember -Group "Remote Desktop Users"  -Member "RDP"

          # Store password securely as a masked secret in env
          echo "RDP_PASSWORD=$password" >> $env:GITHUB_ENV

          # Verify user was actually created
          if (-not (Get-LocalUser -Name "RDP" -ErrorAction SilentlyContinue)) {
              Write-Error "User creation failed."
              exit 1
          }
          Write-Host "RDP user created successfully."

      - name: Install Tailscale
        shell: pwsh
        run: |
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          $installerPath = "$env:TEMP\tailscale.msi"

          Invoke-WebRequest -Uri $tsUrl -OutFile $installerPath -UseBasicParsing
          Start-Process msiexec.exe -ArgumentList "/i", "`"$installerPath`"", "/quiet", "/norestart" -Wait
          Remove-Item $installerPath -Force
          Write-Host "Tailscale installed."

      - name: Establish Tailscale Connection
        shell: pwsh
        run: |
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up `
              --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} `
              --hostname=gh-runner-$env:GITHUB_RUN_ID

          $tsIP = $null
          $retries = 0
          while (-not $tsIP -and $retries -lt 15) {
              Start-Sleep -Seconds 5
              $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4 2>$null
              $retries++
          }

          if (-not $tsIP) {
              Write-Error "Tailscale IP not assigned after $retries retries. Exiting."
              exit 1
          }

          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV
          Write-Host "Tailscale connected. IP: $tsIP"

      - name: Verify RDP Accessibility
        shell: pwsh
        run: |
          Write-Host "Testing RDP on $env:TAILSCALE_IP:3389..."
          $testResult = Test-NetConnection -ComputerName $env:TAILSCALE_IP -Port 3389 -WarningAction SilentlyContinue

          if (-not $testResult.TcpTestSucceeded) {
              Write-Error "TCP connection to port 3389 failed."
              exit 1
          }
          Write-Host "RDP port 3389 is reachable."

      - name: Display Access Info & Maintain Session
        shell: pwsh
        run: |
          Write-Host ""
          Write-Host "=========================================="
          Write-Host "           RDP SESSION READY"
          Write-Host "=========================================="
          Write-Host "  Address  : $env:TAILSCALE_IP"
          Write-Host "  Username : RDP"
          Write-Host "  Password : $env:RDP_PASSWORD"
          Write-Host "  Port     : 3389"
          Write-Host "=========================================="
          Write-Host "  Session auto-terminates in ~6 hours"
          Write-Host "  Cancel workflow manually to end early"
          Write-Host "=========================================="
          Write-Host ""

          # Keep runner alive until GitHub's 6-hour limit
          $duration = 21000  # 350 minutes in seconds (~5h50m, safely under 6h)
          $elapsed = 0
          while ($elapsed -lt $duration) {
              Write-Host "[$(Get-Date -Format 'HH:mm:ss')] Session active | $([math]::Round(($duration - $elapsed)/60)) min remaining"
              Start-Sleep -Seconds 300
              $elapsed += 300
          }

          Write-Host "Session duration reached. Exiting cleanly."
